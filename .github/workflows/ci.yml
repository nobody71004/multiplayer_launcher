name: ci

"on":
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly 06:00 UTC cron provides the ambient-drift probe
    # for the perf-budget-guard regression detector: even when
    # no human pushes, this run archives a fresh
    # junit-integration.xml that the trend-building step
    # (last step in the integration job) pulls back into the
    # rolling 30-run trend table.
    - cron: '0 6 * * *'

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    timeout-minutes: 10
    env:
      # Route the matchmaker subprocess to a per-job temp path so:
      # 1) jobs do not share SQLite WAL state,
      # 2) the WAL-cleanup-on-Windows path (test_persistence.py's
      #    autouse fixture + SqliteStorage.close()) is exercised
      #    cross-platform per the user's explicit ask.
      MATCHMAKER_DB: ${{ github.workspace }}/.tmp/ci_matchmaker.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest
        run: python -m pytest tests/ -v --tb=short

      - name: start_all.py against a fresh tmp MATCHMAKER_DB
        # Runs the full matchmaker subprocess lifecycle (register,
        # login, heartbeat, servers, stub argv contract) writing to
        # $MATCHMAKER_DB. After this step exits, the matchmaker
        # subprocess has terminated and SqliteStorage.close() ran
        # inside the server process -- so the WAL is checkpointed
        # on disk and the next step can read the DB cleanly.
        run: python scripts/start_all.py

      - name: verify cross-restart visibility (read the DB from disk)
        # SECOND Python step = fresh process + fresh sqlite3
        # connection against the DB the previous matchmaker
        # subprocess wrote. This is the ONLY place the persistence
        # story is validated end-to-end -- pytest only validates
        # the in-memory path (conftest.py forces
        # MATCHMAKER_USE_INMEMORY=1 to keep the 39-test suite
        # hermetic).
        run: python scripts/verify_cross_restart.py "$MATCHMAKER_DB"


  integration:
    name: integration (stress variant + perf-budget guard)
    # Excluded from the matrix on purpose: this job boots a real
    # matchmaker subprocess per test module (heavier than unit tests)
    # and gates the heartbeat p95 / list_servers latency promises
    # the multi-stub stress variant advertises. Run on ubuntu-latest
    # only since the assertion (localhost InMemoryStorage) is
    # OS-independent.
    permissions:
      # Least-privilege for the trend step: it only needs to read
      # action artifacts via the GitHub REST API. Everything else
      # (contents, packages, deployments, etc.) is implicit-deny.
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MATCHMAKER_DB: ${{ github.workspace }}/.tmp/ci_matchmaker_integration.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest -m integration (stress variant + perf-budget guard)
        # -s keeps [perf-budget-guard] visible in the live log.
        # --junitxml carries the record_property("perf_budget_guard", ...)
        # dict so a downstream perf-budget dashboard can scrape it
        # post-CI.  The next step archives the XML even on failure
        # (if: always()) so a regression that trips the guard still
        # leaves its trip numbers in the artifact rather than
        # silently discarding them.
        run: python -m pytest tests/ -v -s -m integration --tb=short --junitxml=junit-integration.xml

      - name: archive perf-budget-guard JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-junit
          path: junit-integration.xml


      - name: build perf-budget trend (last 30 nightly runs)
        # A flaky GitHub API hiccup on a single artifact MUST NOT
        # red-light the whole nightly integration job. The trend
        # step is best-effort: emit an empty row or skip a run, but
        # never fail the build -- the perf-budget-guard assertion
        # itself already ran in the pytest step above and the JUnit
        # XML is already archived by the prior step with `if: always()`.
        continue-on-error: true
        # Only on `schedule` so the trend table reflects ambient
        # drift independent of pushes -- a freshly-pushed run has
        # no prior nightly artifacts to compare against, so
        # running on push would either no-op or produce a 1-row
        # table that's noise.
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python scripts/perf_budget_trend.py


  tools-smoke:
    name: tools smoke (matchmaker heartbeat + greet_server validator)
    # Ubuntu-only: matches the `integration` job's posture. The
    # tools have no platform-specific test logic -- localhost binding
    # + ephemeral-port picking is OS-independent in practice.
    #
    # Light-cost job (<1m typical): boots a real matchmaker
    # subprocess + runs greet_server.py as a child process per
    # validator scenario. Keeps the heaviest work (start_all.py,
    # pytest, perf-budget trend) in the existing jobs; this job
    # exists specifically so a regression in greet_server's
    # parse_handshake() CLI surface or fake_game_server's heartbeat
    # path is caught BEFORE a human reviews a PR.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Route the matchmaker subprocess to a per-job temp path so
      # CI never accumulates stale SQLite WAL state in the runner.
      MATCHMAKER_DB: ${{ github.workspace }}/.tmp/ci_tools_smoke.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: tools/ py_compile gate
        # Catches syntax errors before any subprocess boot. Cheap
        # and parallel-safe; lets the next steps fail loud rather
        # than mid-flight.
        run: |
          python -m py_compile tools/probe_common.py
          python -m py_compile tools/probe_greeter.py
          python -m py_compile tools/greet_server.py
          python -m py_compile tools/fake_prelauncher.py
          python -m py_compile tools/fake_game_server.py
          python -m py_compile tools/_local_smoke.py
          python -m py_compile tools/_validator_smoke.py

      - name: headless-stack smoke (matchmaker + fake_game_server)
        # tools/_local_smoke.py boots matchmaking_server.py in a
        # subprocess on :5017 + tools/fake_game_server.py, asserts
        # /api/servers returns the heartbeat entry, and tears both
        # down. Exit code is the smoke result; the next step will
        # only run if this gate passes.
        run: python tools/_local_smoke.py

      - name: greet_server validator harness
        # tools/_validator_smoke.py runs every entry in
        # DEFAULT_SCENARIOS (12 scenarios today) -- boots a fresh
        # greet_server.py with a fresh port per scenario, drives a
        # known byte payload, asserts the parity log line. Surfaces
        # any regression in _validate_handshake or the
        # --validator-* CLI surface as a non-zero exit code.
        run: python tools/_validator_smoke.py -v
